<!DOCTYPE html>
<html>
    <head>
        <title>Calculator Project | ODIN </title>
        <script src="/app.js" defer></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="calculator-wrapper">
                <div class="screen-section" id="result">
                    0
                </div>
                <div class="button-section">
                    <div class="row">
                        <button class="operator" id="allClearBtn">AC</button>
                        <button class="operator" id="percentBtn">&percnt;</button>
                        <button class="operator" id="backspaceBtn">&#9003;</button>
                        <button class="operator" id="divideBtn">&div;</button>
                    </div>
                    <div class="row">
                        <button id="sevenBtn">7</button>                            
                        <button id="eightBtn">8</button>
                        <button id="nineBtn">9</button>
                        <button class="operator" id="timesBtn">&times;</button>

                    </div>
                    <div class="row">
                        <button id="fourBtn">4</button>
                        <button id="fiveBtn">5</button>
                        <button id="sixBtn">6</button>
                        <button class="operator" id="minusBtn">&minus;</button>
                    </div>
                    <div class="row">
                        <button id="oneBtn">1</button>
                        <button id="twoBtn">2</button>
                        <button id="threeBtn">3</button>
                        <button class="operator" id="plusBtn">&plus;</button>
                    </div>
                    <div class="row">
                        <button id="zeroBtn">0</button>
                        <button>.</button>
                        <button class="operator">&equals;</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
