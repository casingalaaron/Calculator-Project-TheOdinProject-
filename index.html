<!DOCTYPE html>
<html>
    <head>
        <title>Calculator Project | ODIN </title>
        <script src="/app.js" defer></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="calculator-wrapper">
                <div class="screen-section" id="result">
                    
                </div>
                <div class="button-section">
                    <div class="row">
                        <button class="operator" id="allClearBtn" data-button="ac">AC</button>
                        <button class="operator" id="percentBtn" data-button="%" >&percnt;</button>
                        <button class="operator" id="backspaceBtn" data-button="del">&#9003;</button>
                        <button class="operator" id="divideBtn" data-button="/">&div;</button>
                    </div>
                    <div class="row">
                        <button id="sevenBtn" data-button="7">7</button>                            
                        <button id="eightBtn" data-button="8">8</button>
                        <button id="nineBtn" data-button="9">9</button>
                        <button class="operator" id="timesBtn" data-button="*">&times;</button>

                    </div>
                    <div class="row">
                        <button id="fourBtn" data-button="4">4</button>
                        <button id="fiveBtn" data-button="5">5</button>
                        <button id="sixBtn" data-button="6">6</button>
                        <button class="operator" id="minusBtn" data-button="-">&minus;</button>
                    </div>
                    <div class="row">
                        <button id="oneBtn" data-button="1">1</button>
                        <button id="twoBtn" data-button="2">2</button>
                        <button id="threeBtn" data-button="3">3</button>
                        <button class="operator" id="plusBtn" data-button="+">&plus;</button>
                    </div>
                    <div class="row">
                        <button id="zeroBtn" data-button="0">0</button>
                        <button data-button=".">.</button>
                        <button class="operator" data-button="=">&equals;</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
